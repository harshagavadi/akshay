services:
  - type: web
    name: snapclipper-backend
    runtime: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: RAPIDAPI_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false
